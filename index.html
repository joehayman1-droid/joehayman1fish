// ── MODEL FALLBACK ───────────────────────────────────────────────────────
// Tries models in order until one works
const MODELS = [
  'claude-sonnet-4-20250514',    // Active — Anthropic confirmed until June 15 2026
  'claude-haiku-4-5-20251001',   // Active — fast and cheap fallback
  'claude-opus-4-20250514',      // Active — most capable fallback
];

async function callClaude(apiKey, body) {
  for (const model of MODELS) {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ ...body, model })
    });
    const raw = await resp.text();
    const data = JSON.parse(raw);
    // If model not found, try next
    if (data.type === 'error' && data.error?.message?.startsWith('model:')) {
      console.warn('Model not available:', model, '— trying next');
      continue;
    }
    return { resp, raw, data, model };
  }
  throw new Error('No available Claude model found. Please check your API key at console.anthropic.com');
}

// ── LOCAL CALCULATIONS ───────────────────────────────────────────────────
function moonCalc(){
  const age=((Date.now()-new Date('2024-01-11').getTime())/86400000)%29.53;
  const lbl=age<1.5?'New Moon':age<7.5?'Wax Crescent':age<10?'1st Quarter':age<14?'Wax Gibbous':age<16?'Full Moon':age<22?'Wan Gibbous':age<25?'Last Quarter':'Wan Crescent';
  const base=6+(age/29.53*24)%12;
  const f=h=>{const hh=Math.floor(h)%24,mm=Math.round((h%1)*60);return `${hh>12?hh-12:hh||12}:${mm.toString().padStart(2,'0')} ${hh>=12?'PM':'AM'}`;};
  return{lbl,age:Math.round(age),pct:Math.round(age/29.53*100),m1:f(base),m2:f((base+12)%24),n1:f((base+6)%24),n2:f((base+18)%24)};
}
function sunCalc(){
  const now=new Date(),r=Math.PI/180;
  const d=Math.floor((now-new Date(now.getFullYear(),0,0))/86400000);
  const B=2*Math.PI*(d-1)/365;
  const eqT=229.18*(0.000075+0.001868*Math.cos(B)-0.032077*Math.sin(B)-0.014615*Math.cos(2*B)-0.04089*Math.sin(2*B));
  const decl=0.006918-0.399912*Math.cos(B)+0.070257*Math.sin(B)-0.006758*Math.cos(2*B)+0.000907*Math.sin(2*B)-0.002697*Math.cos(3*B)+0.00148*Math.sin(3*B);
  const ch=Math.cos(90.833*r)/(Math.cos(LAT*r)*Math.cos(decl))-Math.tan(LAT*r)*Math.tan(decl);
  const ha=Math.acos(Math.max(-1,Math.min(1,ch)))/r;
  const tz=(now.getMonth()>=2&&now.getMonth()<=10)?-5:-6;
  const sr=720-4*(LON+ha)-eqT+tz*60,ss=720-4*(LON-ha)-eqT+tz*60;
  const f=m=>{const h=Math.floor(m/60)%24,mn=Math.round(m%60);return `${h>12?h-12:h||12}:${mn.toString().padStart(2,'0')} ${h>=12?'PM':'AM'}`;};
  return{rise:f(sr),set:f(ss),gold:f(ss-45),dawn:f(sr-30)};
}

// ── LIVE CONDITIONS FETCH ────────────────────────────────────────────────
async function fetchLive(){
  const out={data:{},flags:{}};
  const dirs=['N','NE','E','SE','S','SW','W','NW'];
  await Promise.allSettled([
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,windspeed_10m,winddirection_10m,surface_pressure,weathercode,cloud_cover,precipitation&hourly=surface_pressure&timezone=America%2FChicago&past_days=2&forecast_days=0`)
      .then(r=>r.json()).then(d=>{
        const c=d.current,ph=d.hourly?.surface_pressure||[];
        const trend=ph.length>12?ph[ph.length-1]-ph[ph.length-13]:0;
        out.pressureHistory=ph;
        out.data.airTemp=((c.temperature_2m*9/5)+32).toFixed(0)+'°F';
        out.data.wind=((c.windspeed_10m*0.621371).toFixed(0))+' mph '+dirs[Math.round(c.winddirection_10m/45)%8];
        out.data.windRaw={mph:(c.windspeed_10m*0.621371).toFixed(0),dir:dirs[Math.round(c.winddirection_10m/45)%8]};
        out.data.pressure=Math.round(c.surface_pressure)+' hPa';
        out.data.pTrend=trend<-1.5?'Falling ↓ — fish feeding':trend>1.5?'Rising ↑ — bite may slow':'Stable →';
        out.data.pTrendShort=trend<-1.5?'Falling ↓':trend>1.5?'Rising ↑':'Stable →';
        out.data.sky=c.weathercode===0?'Clear':c.weathercode<=3?'Partly cloudy':c.weathercode<=49?'Overcast':c.weathercode<=67?'Rain':'Storms';
        out.data.cloud=(c.cloud_cover||0)+'%';
        out.data.precip=(c.precipitation||0).toFixed(2)+' in';
        out.flags.weather=true;
      }).catch(e=>{out.flags.weather=false;out.flags.weatherErr=e.message;}),
    fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=42.0&longitude=-86.7&current=wave_height,sea_surface_temperature&timezone=America%2FChicago`)
      .then(r=>r.json()).then(d=>{
        const wf=(d.current.wave_height*3.28084).toFixed(1);
        out.data.lakeWaves=wf+' ft';
        out.data.lakeSafe=parseFloat(wf)<=2.0;
        out.data.lakeSafeLabel=parseFloat(wf)<=2.0?'✓ Lake boat OK':'⚠ Too rough';
        if(d.current.sea_surface_temperature) out.data.lakeTemp=((d.current.sea_surface_temperature*9/5)+32).toFixed(0)+'°F';
        out.flags.marine=true;
      }).catch(e=>{out.flags.marine=false;out.flags.marineErr=e.message;}),
    fetch(`https://waterservices.usgs.gov/nwis/iv/?sites=04101500&parameterCd=00060,00010,00065&format=json&period=PT26H`)
      .then(r=>r.json()).then(d=>{
        let cfs=null,tc=null,stage=null,stagePrev=null;
        for(const s of d.value?.timeSeries||[]){
          const code=s.variable?.variableCode?.[0]?.value,vals=s.values?.[0]?.value||[];
          if(code==='00060')cfs=parseFloat(vals[vals.length-1]?.value);
          if(code==='00010')tc=parseFloat(vals[vals.length-1]?.value);
          if(code==='00065'){stage=parseFloat(vals[vals.length-1]?.value);stagePrev=parseFloat(vals[0]?.value);}
        }
        if(cfs)out.data.riverCfs=Math.round(cfs)+' cfs';
        if(tc)out.data.riverTemp=((tc*9/5)+32).toFixed(0)+'°F';
        out.data.riverCond=cfs==null?'unknown':cfs<800?'Low & clear':cfs<2000?'Normal flow':'High & stained';
        out.data.riverStage=(stage!=null&&stagePrev!=null)?(stage>stagePrev+0.1?'Rising ↑':stage<stagePrev-0.1?'Falling ↓':'Stable →'):'unknown';
        out.flags.river=true;
      }).catch(e=>{out.flags.river=false;out.flags.riverErr=e.message;}),
  ]);
  return out;
}

// ── REPORT PARSER ────────────────────────────────────────────────────────
function parseReport(text){
  const get=tag=>{const m=text.match(new RegExp(`<${tag}>([\\s\\S]*?)<\\/${tag}>`));return m?m[1].trim():'';};
  const getAll=tag=>{const res=[];const re=new RegExp(`<${tag}>([\\s\\S]*?)<\\/${tag}>`,'g');let m;while((m=re.exec(text))!==null)res.push(m[1].trim());return res;};
  const field=(b,k)=>{const m=b.match(new RegExp(`^${k}:\\s*(.+)$`,'m'));return m?m[1].trim():'';};
  return{
    confidence:parseInt(get('confidence'))||75,
    narrative:get('narrative'),
    intel:getAll('intel').map(i=>({finding:field(i,'finding'),source:field(i,'source')})).filter(i=>i.finding),
    waters:getAll('water').map(w=>({name:field(w,'name'),boat:field(w,'boat'),topPick:field(w,'top')==='yes',species:field(w,'species').split(',').map(s=>s.trim()).filter(Boolean),notes:field(w,'notes')})).filter(w=>w.name),
    timing:getAll('time').map(t=>({icon:field(t,'icon'),label:field(t,'label'),detail:field(t,'detail')})).filter(t=>t.label),
    gear:getAll('gear').map(g=>({species:field(g,'species'),recommendation:field(g,'rec')})).filter(g=>g.species),
  };
}

// ── SPARKLINE ────────────────────────────────────────────────────────────
function Sparkline({values}){
  if(!values||values.length<4)return null;
  const pts=values.slice(-48);
  const mn=Math.min(...pts)-0.5,mx=Math.max(...pts)+0.5;
  const W=300,H=40;
  const path=pts.map((v,i)=>`${((i/(pts.length-1))*W).toFixed(1)},${(H-((v-mn)/(mx-mn))*H).toFixed(1)}`).join(' ');
  const trend=pts[pts.length-1]-pts[0];
  const col=trend<-1.5?'#4ade80':trend>1.5?'#f87171':'#f5c842';
  const lbl=trend<-1.5?'Falling ↓ — fish feeding':trend>1.5?'Rising ↑ — bite may slow':'Stable →';
  return(
    <div style={{background:'#0e2014',border:'2px solid #2a5c35',borderRadius:6,padding:'10px 13px',marginBottom:10}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:5,flexWrap:'wrap',gap:4}}>
        <span style={{fontFamily:'monospace',fontSize:'.58rem',color:'#4ade80',fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>48-Hour Pressure Trend · LIVE</span>
        <span style={{fontFamily:'monospace',fontSize:'.6rem',color:col,fontWeight:700}}>{lbl}</span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:36,display:'block'}}>
        <polyline points={path} fill="none" stroke={col} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
        <circle cx={W} cy={(H-((pts[pts.length-1]-mn)/(mx-mn))*H).toFixed(1)} r="3.5" fill={col}/>
      </svg>
      <div style={{display:'flex',justifyContent:'space-between',fontFamily:'monospace',fontSize:'.53rem',color:'#6aad7a',marginTop:2}}>
        <span>48 hrs ago</span><span>now</span>
      </div>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────
function App(){
  const now=new Date(),moon=moonCalc(),sun=sunCalc();
  const mn=now.getMonth()+1,mName=MO[mn],hr=now.getHours();

  const [key,setKey]=useState('');
  const [showKey,setShowKey]=useState(false);
  const [mode,setMode]=useState('all');
  const [target,setTarget]=useState(null);
  const [waterSel,setWaterSel]=useState(null);
  const [tonight,setTonight]=useState(hr>=18||hr<6);
  const [live,setLive]=useState({});
  const [pressureHist,setPressureHist]=useState([]);
  const [liveFlags,setLiveFlags]=useState({});
  const [condStatus,setCondStatus]=useState('Loading live conditions...');
  const [quickPicks,setQuickPicks]=useState([]);
  const [cachedReport,setCachedReport]=useState(null);
  const [busy,setBusy]=useState(false);
  const [report,setReport]=useState(null);
  const [webStatus,setWebStatus]=useState('');
  const [status,setStatus]=useState('');
  const [dbg,setDbg]=useState('');
  const [err,setErr]=useState('');

  useEffect(()=>{
    const k=store.get('bfr_key');
    if(k){setKey(k);}else{setShowKey(true);}
    const picks=store.get('bfr_picks');
    if(picks)setQuickPicks(picks);
    const cache=store.get('bfr_cache');
    if(cache)setCachedReport(cache);

    // Fetch live conditions
    fetchLive().then(result=>{
      setLive(result.data||{});
      setPressureHist(result.pressureHistory||[]);
      setLiveFlags(result.flags||{});
      const anyLive=result.flags?.weather||result.flags?.marine||result.flags?.river;
      if(anyLive){
        const parts=[];
        if(result.flags?.weather)parts.push('weather');
        if(result.flags?.marine)parts.push('waves & lake temp');
        if(result.flags?.river)parts.push('river gauge');
        setCondStatus('LIVE: '+parts.join(' · '));
      } else {
        // Show error details for debugging
        const errs=[];
        if(result.flags?.weatherErr)errs.push('wx:'+result.flags.weatherErr.slice(0,40));
        if(result.flags?.marineErr)errs.push('marine:'+result.flags.marineErr.slice(0,40));
        if(result.flags?.riverErr)errs.push('river:'+result.flags.riverErr.slice(0,40));
        setCondStatus('Live data unavailable'+(errs.length?' — '+errs.join(', '):''));
      }
    });
  },[]);

  function saveKey(k){
    const v=k.trim();
    store.set('bfr_key',v);
    setKey(v);setShowKey(false);
  }

  function switchMode(m){setMode(m);setTarget(null);setWaterSel(null);setReport(null);}

  function savePick(){
    const lbl=waterSel?waterSel.label+(target?' + '+target:''):target||"What's Biting";
    const pick={mode,target,waterSel,lbl};
    const next=[pick,...quickPicks.filter(p=>p.lbl!==lbl)].slice(0,6);
    setQuickPicks(next);store.set('bfr_picks',next);
  }

  function applyPick(p){setMode(p.mode);setTarget(p.target);setWaterSel(p.waterSel);setReport(null);}
  function removePick(lbl){const n=quickPicks.filter(p=>p.lbl!==lbl);setQuickPicks(n);store.set('bfr_picks',n);}

  const incompatible=mode==='water'&&waterSel&&target&&COMPAT[waterSel.id]&&!COMPAT[waterSel.id].includes(target);

  async function go(){
    if(mode==='water'&&!waterSel){setStatus('Pick a water body first');return;}
    if(mode==='species'&&!target){setStatus('Pick a species first');return;}
    if(!key){setShowKey(true);return;}
    setBusy(true);setReport(null);setErr('');setDbg('');setStatus('');setWebStatus('');

    const L=live;
    const anyLive=liveFlags.weather||liveFlags.marine||liveFlags.river;

    // Try web search intel
    setWebStatus('🔍 Searching current fishing reports...');
    let webIntel='';
    try{
      const q=waterSel?`${waterSel.label} fishing ${mName} Michigan`:target?`${target} fishing Michigan ${mName} tips`:
        `southwest Michigan Berrien County fishing report ${mName} St Joseph River`;
      const wrResult=await callClaude(key,{
          max_tokens:500,
          tools:[{type:'web_search_20250305',name:'web_search'}],
          system:'Search for current fishing information. Return only a plain text summary of key findings.',
          messages:[{role:'user',content:`Search: "${q}" and "In-Fisherman ${target||'Michigan'} ${mName} fish behavior". Summarize: what is biting, biological WHY (spawn stage, temp triggers), local reports, gear tips. Include source names.`}]
        })
      });
      if(wr.ok){
        const wd=await wr.json();
        if(wd.type!=='error'){
          const wt=(wd.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
          if(wt){webIntel=wt;setWebStatus('📡 Live fishing reports found');}
          else setWebStatus('📚 Using seasonal knowledge');
        } else setWebStatus('📚 Using seasonal knowledge');
      } else setWebStatus('📚 Using seasonal knowledge');
    }catch{setWebStatus('📚 Using seasonal knowledge');}

    // Build conditions block for prompt
    const condBlock=anyLive?`
LIVE CONDITIONS (real-time sensor data):
Air temperature: ${L.airTemp||'unknown'} | Sky: ${L.sky||'unknown'} | Cloud cover: ${L.cloud||'unknown'}
Wind: ${L.wind||'unknown'}
Barometric pressure: ${L.pressure||'unknown'} | Trend: ${L.pTrend||'unknown'}
Lake Michigan waves: ${L.lakeWaves||'unknown'} (${L.lakeSafeLabel||''})
Lake Michigan water temp (SST): ${L.lakeTemp||'unknown'}
St. Joseph River flow: ${L.riverCfs||'unknown'} | Condition: ${L.riverCond||'unknown'}
St. Joseph River water temp: ${L.riverTemp||'unknown'} | Stage: ${L.riverStage||'unknown'}`
:`(Live sensor data unavailable — use your knowledge of typical ${mName} conditions for Berrien County SW Michigan)`;

    const nightLine=tonight?'\nNIGHT FISHING MODE: Focus on night-active species (bullhead, catfish, carp, walleye at night), slow pool and backwater spots, bottom rigs, glow tips.':'';
    const waterLine=waterSel?`\nFOCUS WATER: ${waterSel.label} (${waterSel.sub}) — give specific spots WITHIN this water, not just the water name.`:'';
    const specLine=target?`TARGET: ${target}.${incompatible&&waterSel?` NOTE: ${target} are not typically in ${waterSel.label} — say so and suggest the right water.`:''}`
      :waterSel?'Recommend what is biting at '+waterSel.label+' right now.':'Recommend best 1-3 waters for today.';

    const prompt=`You are an expert fishing guide for Berrien County, SW Michigan.
${waterLine}${nightLine}
${specLine}
${condBlock}
${webIntel?'\nCURRENT WEB FISHING INTEL:\n'+webIntel:''}

Date: ${now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})} at ${now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}
Month: ${mName} | Hour: ${hr}:00${tonight?' (NIGHT SESSION)':''}
Moon: ${moon.lbl} (${moon.age} days, ${moon.pct}% lit)
Major solunar: ${moon.m1} and ${moon.m2} | Minor: ${moon.n1} and ${moon.n2}
Dawn: ${sun.dawn} | Sunrise: ${sun.rise} | Golden hour: ${sun.gold} | Sunset: ${sun.set}

WATERS: St Joseph River (Berrien Springs tailrace, Niles stretch, river mouth/Benton Harbor, Paw Paw confluence): smallmouth, walleye, steelhead spring/fall, chinook/coho fall, catfish, bullhead, carp, pike. Paw Paw Lake: bass, crappie, walleye, perch, pike, bullhead. Magician/Barron chain: bass, walleye, pike. Donnell/Stone/Clear: bass, panfish. LM piers: perch, steelhead. LM offshore 40-120ft: chinook, coho, lake trout (calm only).
DNR: Bass inland opener last Saturday May, 12in min. Walleye year-round, 15in inland. Pike 24in min. Panfish/catfish/bullhead year-round.

Respond ONLY with this XML format — no other text:

<confidence>82</confidence>
<narrative>3 sentences on what fish are doing RIGHT NOW and exactly why. Use the live data above — mention actual temps, pressure trend, stage trend. Name specific spots.</narrative>

<intel>
finding: Key biological insight with WHY — use live conditions and web intel where available
source: Source name
</intel>

<intel>
finding: Second insight on spawn stage, forage, or moon effect
source: Source name
</intel>

<water>
name: Specific water and exact spot within it
boat: Boat type
top: yes
species: Species One, Species Two
notes: Why this spot today based on live conditions and biology
</water>

<water>
name: Second water or spot
boat: Boat type
top: no
species: Species One, Species Two
notes: Why and what to expect
</water>

<time>
icon: 🌅
label: Best window label
detail: Specific time range using the solunar and light data above
</time>

<time>
icon: 🌙
label: ${tonight?'Night window':'Evening window'}
detail: Specific time and reason
</time>

<gear>
species: Species Name
rec: Setup 1 - lure, color, weight, hook, rig, depth, retrieve technique. Setup 2 - alternative approach.
</gear>

<gear>
species: Second Species
rec: Setup 1 - exact details. Setup 2 - alternative.
</gear>`;

    try{
      setStatus('Generating report...');
      const {raw,data,model:usedModel}=await callClaude(key,{
          max_tokens:2000,
          system:'You are a fishing guide assistant. Respond using only the XML tag format requested. No text before or after the tags.',
          messages:[{role:'user',content:prompt}]
        });
      setDbg(`Model: ${usedModel} · ${raw.length} chars`);
      if(data.type==='error')throw new Error(data.error?.message||'API error');
      const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
      if(!txt.includes('<confidence>'))throw new Error('Unexpected response. Check API key. Preview: '+txt.slice(0,80));
      const result=parseReport(txt);
      setReport(result);
      setStatus('Tight lines, Joseph.');
      const cacheObj={report:result,mode,target,waterSel,tonight,mName,ts:Date.now()};
      store.set('bfr_cache',cacheObj);
      setCachedReport(cacheObj);
    }catch(e){
      setErr(e.message);setStatus('Error — see below');
    }finally{setBusy(false);}
  }

  const r=report||{},conf=r.confidence||75;
  const anyLive=liveFlags.weather||liveFlags.marine||liveFlags.river;
  const reportCtx=[waterSel?.label,target,tonight?'🌙 Night':null].filter(Boolean).join(' · ')||('Berrien County · '+mName);

  return(
    <div style={{background:BG,minHeight:'100vh',color:'#c8e6c9'}} className="safe-wrap">
    <div style={{maxWidth:860,margin:'0 auto'}}>

      {/* HEADER */}
      <div style={{borderBottom:`2px solid ${G}`,paddingBottom:11,marginBottom:13,display:'flex',justifyContent:'space-between',alignItems:'flex-end',flexWrap:'wrap',gap:7}}>
        <div>
          <div style={{...serif,fontSize:'clamp(1.5rem,6vw,2.3rem)',color:G,letterSpacing:3,lineHeight:1}}>Berrien Fish Report</div>
          <div style={{...mono,fontSize:'.63rem',color:GR,letterSpacing:2,marginTop:3,textTransform:'uppercase'}}>St. Joseph River · Inland Lakes · Lake Michigan</div>
        </div>
        <div style={{...mono,fontSize:'.68rem',color:W,textAlign:'right',lineHeight:1.7}}>
          {now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}<br/>
          {now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}
        </div>
      </div>

      {/* API KEY */}
      {showKey?(
        <div style={{background:CA,border:`2px solid ${G}`,borderRadius:8,padding:14,marginBottom:13}}>
          <div style={{...serif,fontSize:'.9rem',color:G,marginBottom:6}}>🔑 Anthropic API Key</div>
          <div style={{fontSize:'.82rem',color:'#c8e6c9',marginBottom:9,lineHeight:1.55}}>Starts with <span style={{color:G,...mono}}>sk-ant-</span> — saved on this device only.</div>
          <input id="ki" type="password" placeholder="sk-ant-api03-..."
            style={{width:'100%',background:DA,border:`2px solid ${BO}`,borderRadius:4,padding:'10px 11px',color:W,...mono,fontSize:'.75rem',outline:'none',marginBottom:9}}/>
          <div style={{display:'flex',gap:9,flexWrap:'wrap'}}>
            <button onClick={()=>saveKey(document.getElementById('ki').value)}
              style={{background:G,color:'#000',border:'none',borderRadius:4,padding:'9px 18px',...mono,fontSize:'.73rem',fontWeight:700,cursor:'pointer'}}>Save Key</button>
            {key&&<button onClick={()=>setShowKey(false)}
              style={{background:'transparent',color:GR,border:`1px solid ${BO}`,borderRadius:4,padding:'9px 13px',...mono,fontSize:'.73rem',cursor:'pointer'}}>Cancel</button>}
          </div>
        </div>
      ):(
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:CA,border:`2px solid ${key?GR:BO}`,borderRadius:6,padding:'7px 12px',marginBottom:10}}>
          <span style={{...mono,fontSize:'.6rem',color:key?GR:'#888'}}>{key?'🟢 API key set — AI reports enabled':'⚪ No API key — tap Add Key'}</span>
          <button onClick={()=>setShowKey(true)} style={{background:'transparent',color:G,border:`1px solid ${BO}`,borderRadius:4,padding:'4px 10px',...mono,fontSize:'.58rem',cursor:'pointer'}}>{key?'Change':'Add Key'}</button>
        </div>
      )}

      {/* QUICK PICKS */}
      {quickPicks.length>0&&(
        <div style={{marginBottom:11}}>
          <div style={{...mono,fontSize:'.55rem',color:'#888',textTransform:'uppercase',letterSpacing:2,marginBottom:5}}>⚡ Quick Picks</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
            {quickPicks.map((p,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',background:CA,border:`1px solid ${BO}`,borderRadius:4,overflow:'hidden'}}>
                <button onClick={()=>applyPick(p)} style={{padding:'6px 10px',background:'transparent',border:'none',color:G,...mono,fontSize:'.65rem',cursor:'pointer',fontWeight:700}}>{p.lbl}</button>
                <button onClick={()=>removePick(p.lbl)} style={{padding:'5px 7px',background:'transparent',border:'none',color:'#555',...mono,fontSize:'.65rem',cursor:'pointer'}}>×</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* MODE */}
      <div style={{display:'flex',border:`2px solid ${BO}`,borderRadius:6,overflow:'hidden',marginBottom:11}}>
        {[['all',"🎣 What's Biting"],['species','🎯 Species'],['water','📍 Pick Water']].map(([m,lbl],i,arr)=>(
          <button key={m} style={{flex:1,padding:'11px 4px',background:mode===m?G:DA,border:'none',cursor:'pointer',...mono,fontSize:'.62rem',color:mode===m?'#000':'#6aad7a',textTransform:'uppercase',fontWeight:mode===m?700:400,borderRight:i<arr.length-1?`1px solid ${BO}`:'none'}}
            onClick={()=>switchMode(m)}>{lbl}</button>
        ))}
      </div>

      {/* SPECIES */}
      {mode==='species'&&(
        <div style={{marginBottom:11}}>
          <div style={{...mono,fontSize:'.6rem',color:G,textTransform:'uppercase',letterSpacing:2,marginBottom:6,fontWeight:700}}>Select target species</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {SPECIES.map(sp=>(
              <button key={sp} style={{padding:'7px 11px',borderRadius:4,border:target===sp?`2px solid ${G}`:`2px solid ${BO}`,background:target===sp?G:CA,color:target===sp?'#000':W,...mono,fontSize:'.67rem',cursor:'pointer',fontWeight:target===sp?700:400}}
                onClick={()=>{setTarget(sp);setReport(null);}}>{sp}</button>
            ))}
          </div>
        </div>
      )}

      {/* WATER SELECTOR */}
      {mode==='water'&&(
        <div style={{marginBottom:11}}>
          {WATERS.map(group=>(
            <div key={group.group} style={{marginBottom:11}}>
              <div style={{...mono,fontSize:'.58rem',color:group.col,textTransform:'uppercase',letterSpacing:2,marginBottom:6,fontWeight:700,borderBottom:`1px solid ${BO}`,paddingBottom:3}}>{group.group}</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {group.items.map(w=>(
                  <button key={w.id}
                    style={{padding:'7px 11px',borderRadius:4,border:waterSel?.id===w.id?`2px solid ${G}`:`2px solid ${BO}`,background:waterSel?.id===w.id?G:CA,color:waterSel?.id===w.id?'#000':W,cursor:'pointer',textAlign:'left',...mono,fontSize:'.64rem',fontWeight:waterSel?.id===w.id?700:400}}
                    onClick={()=>{setWaterSel(w);setReport(null);}}>
                    <div style={{fontWeight:700}}>{w.label}</div>
                    <div style={{fontSize:'.55rem',opacity:0.7,marginTop:1}}>{w.sub}</div>
                  </button>
                ))}
              </div>
            </div>
          ))}
          {waterSel&&(
            <div style={{background:DA,border:`1px solid ${BO}`,borderRadius:6,padding:'9px 11px'}}>
              <div style={{...mono,fontSize:'.58rem',color:G,textTransform:'uppercase',letterSpacing:2,marginBottom:6,fontWeight:700}}>Optional: target species at {waterSel.label}</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                <button style={{padding:'5px 9px',borderRadius:4,border:!target?`2px solid ${G}`:`2px solid ${BO}`,background:!target?G:CA,color:!target?'#000':W,...mono,fontSize:'.62rem',cursor:'pointer'}}
                  onClick={()=>{setTarget(null);setReport(null);}}>All species</button>
                {SPECIES.map(sp=>{
                  const notHere=COMPAT[waterSel.id]&&!COMPAT[waterSel.id].includes(sp);
                  return(
                    <button key={sp} style={{padding:'5px 9px',borderRadius:4,border:target===sp?`2px solid ${G}`:notHere?'1px dashed #444':`2px solid ${BO}`,background:target===sp?G:notHere?'#1a1a1a':CA,color:target===sp?'#000':notHere?'#444':W,...mono,fontSize:'.62rem',cursor:'pointer',position:'relative'}}
                      onClick={()=>{setTarget(sp);setReport(null);}}>
                      {notHere&&<span style={{fontSize:'.48rem',color:'#f87171',position:'absolute',top:-5,right:1}}>✗</span>}
                      {sp}
                    </button>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}

      {/* COMPATIBILITY WARNING */}
      {incompatible&&(
        <div style={{background:'rgba(248,113,113,.08)',border:'2px solid #f87171',borderRadius:6,padding:'8px 12px',marginBottom:9,...mono,fontSize:'.73rem',color:'#fca5a5',lineHeight:1.6}}>
          ⚠ {target} are not typically found in {waterSel?.label}. The report will acknowledge this.
        </div>
      )}

      {/* TONIGHT TOGGLE */}
      <div style={{marginBottom:11}}>
        <button onClick={()=>setTonight(t=>!t)}
          style={{display:'flex',alignItems:'center',gap:7,padding:'8px 13px',borderRadius:20,border:`2px solid ${tonight?G:BO}`,background:tonight?'rgba(245,200,66,.1)':CA,color:tonight?G:'#888',cursor:'pointer',...mono,fontSize:'.67rem',fontWeight:tonight?700:400}}>
          <span style={{fontSize:'1rem'}}>🌙</span>
          {tonight?'TONIGHT MODE — Night fishing':'Tonight Mode — tap for night fishing'}
        </button>
      </div>

      {/* LIVE CONDITIONS STATUS */}
      <div style={{...mono,fontSize:'.58rem',color:anyLive?GR:'#666',marginBottom:7,lineHeight:1.5}}>
        <span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:anyLive?GR:'#444',marginRight:5,verticalAlign:'middle'}}/>
        {condStatus}
      </div>

      {/* DATA CARDS */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(110px,1fr))',gap:6,marginBottom:7}}>
        <Card l="Moon Phase" v={moon.lbl}             s={`${moon.age}d · ${moon.pct}%`}/>
        <Card l="Sunrise"    v={sun.rise}              s={`Dawn: ${sun.dawn}`}/>
        <Card l="Sunset"     v={sun.set}               s={`Golden: ${sun.gold}`}/>
        <Card l="Air Temp"   v={live.airTemp||'—'}     s={live.sky||'loading...'}           live={!!live.airTemp}/>
        <Card l="Wind"       v={live.windRaw?live.windRaw.mph+' mph':'—'} s={live.windRaw?.dir||''} live={!!live.wind}/>
        <Card l="Pressure"   v={live.pressure||'—'}    s={live.pTrendShort||'loading...'}   live={!!live.pressure}/>
        <Card l="LM Waves"   v={live.lakeWaves||'—'}   s={live.lakeSafeLabel||'loading...'}  live={!!live.lakeWaves}/>
        <Card l="LM Water Temp" v={live.lakeTemp||'—'} s="Lake Michigan SST"                live={!!live.lakeTemp}/>
        <Card l="River Flow" v={live.riverCfs||'—'}    s={live.riverCond||'loading...'}     live={!!live.riverCfs}/>
        <Card l="River Temp" v={live.riverTemp||'—'}   s={live.riverStage||'St Joe gauge'}  live={!!live.riverTemp}/>
      </div>

      {/* PRESSURE SPARKLINE */}
      <Sparkline values={pressureHist}/>

      {/* SOLUNAR */}
      <div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:12,alignItems:'center'}}>
        {[['MAJOR',moon.m1,moon.m2],['MINOR',moon.n1,moon.n2]].map(([lbl,t1,t2],i)=>(
          <div key={i} style={{display:'flex',gap:5,alignItems:'center',marginLeft:i?5:0}}>
            <span style={{...mono,fontSize:'.58rem',fontWeight:700,textTransform:'uppercase',padding:'4px 7px',borderRadius:4,background:G,color:'#000'}}>{lbl} FEED</span>
            {[t1,t2].map((t,j)=><span key={j} style={{...mono,fontSize:'.67rem',padding:'4px 10px',borderRadius:4,border:`2px solid ${BO}`,background:CA,color:W,fontWeight:700}}>{t}</span>)}
          </div>
        ))}
      </div>

      {/* CACHED REPORT */}
      {cachedReport&&!report&&(
        <div style={{background:DA,border:`1px solid ${BO}`,borderRadius:6,padding:'7px 12px',marginBottom:9,...mono,fontSize:'.6rem',color:'#888',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span>💾 Last: {cachedReport.mName} · {cachedReport.waterSel?.label||cachedReport.target||'General'} · {new Date(cachedReport.ts).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</span>
          <button onClick={()=>setReport(cachedReport.report)} style={{background:'transparent',color:G,border:`1px solid ${BO}`,borderRadius:3,padding:'3px 8px',cursor:'pointer',...mono,fontSize:'.58rem'}}>Load</button>
        </div>
      )}

      {webStatus&&<div style={{...mono,fontSize:'.6rem',color:'#6aad7a',marginBottom:6}}>{webStatus}</div>}

      {/* CTA */}
      <div style={{textAlign:'center',margin:'12px 0 5px'}}>
        <button style={{background:busy?'#3a5c3a':G,color:busy?'#6aad7a':'#000',border:'none',...serif,fontSize:'1.2rem',letterSpacing:4,padding:'14px 0',borderRadius:6,cursor:busy?'not-allowed':'pointer',fontWeight:700,width:'100%',maxWidth:440,WebkitTapHighlightColor:'transparent'}}
          disabled={busy} onClick={go}>
          {busy?'⏳ Generating...':'GET REPORT'}
        </button>
        {status&&<div style={{...mono,fontSize:'.67rem',color:busy?OR:GR,marginTop:6,fontWeight:600}}>{status}</div>}
      </div>

      {dbg&&<div style={{...mono,fontSize:'.57rem',color:'#5a9a6a',background:'#040d07',border:`1px solid ${BO}`,borderRadius:4,padding:'5px 9px',marginTop:6,wordBreak:'break-all'}}>{dbg}</div>}
      {err&&<div style={{color:'#f87171',background:'#2a0a0a',border:'2px solid #f87171',borderRadius:6,padding:'8px 12px',fontSize:'.82rem',marginTop:7}}>⚠ {err}</div>}

      {/* RESULTS */}
      {report&&(<div>
        <div style={{background:DA,border:`1px solid ${BO}`,borderRadius:6,padding:'8px 12px',marginTop:15,marginBottom:4,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:6}}>
          <span style={{...mono,fontSize:'.63rem',color:G,fontWeight:700}}>📍 {reportCtx.toUpperCase()}</span>
          <button onClick={savePick} style={{background:'transparent',color:GR,border:`1px solid ${BO}`,borderRadius:3,padding:'3px 8px',...mono,fontSize:'.57rem',cursor:'pointer'}}>⭐ Save as Quick Pick</button>
        </div>

        <Sec t="Field Intel"/>
        <div style={{background:CA,border:`2px solid ${OR}`,borderLeft:`5px solid ${OR}`,borderRadius:6,padding:12}}>
          <div style={{...serif,fontSize:'.85rem',color:OR,letterSpacing:2,marginBottom:8,textTransform:'uppercase'}}>📡 {mName} Intelligence</div>
          {(r.intel||[]).map((it,i,a)=>(
            <div key={i} style={{padding:'7px 0',fontSize:'.84rem',lineHeight:1.7,color:W,borderBottom:i<a.length-1?`1px solid ${BO}`:'none'}}>
              {it.finding}<div style={{...mono,fontSize:'.58rem',color:GR,marginTop:3,fontWeight:600}}>📰 {it.source}</div>
            </div>))}
        </div>

        <Sec t="AI Field Assessment"/>
        <div style={{background:CA,border:`2px solid ${G}`,borderLeft:`6px solid ${G}`,padding:'12px 14px',borderRadius:6,fontSize:'.87rem',lineHeight:1.85,color:W}}>{r.narrative}</div>

        <Sec t="Where to Go"/>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:9}}>
          {(r.waters||[]).map((w,i)=>(
            <div key={i} style={{background:CA,border:w.topPick?`3px solid ${G}`:`2px solid ${BO}`,borderRadius:6,padding:12}}>
              {w.topPick&&<div style={{display:'inline-block',background:G,color:'#000',...mono,fontSize:'.54rem',fontWeight:700,padding:'2px 7px',borderRadius:3,marginBottom:5}}>⭐ TOP PICK</div>}
              <div style={{...serif,fontSize:'.97rem',color:W,marginBottom:3}}>{w.name}</div>
              <div style={{display:'inline-block',...mono,fontSize:'.58rem',background:'#1a3d22',border:`2px solid ${GR}`,color:GR,padding:'2px 7px',borderRadius:4,marginBottom:7,fontWeight:700}}>{w.boat}</div>
              <ul style={{listStyle:'none',marginBottom:7}}>
                {w.species.map((sp,j,a)=>(
                  <li key={j} style={{fontSize:'.84rem',color:W,padding:'3px 0',display:'flex',alignItems:'center',gap:5,borderBottom:j<a.length-1?`1px solid ${BO}`:'none'}}>
                    <span style={{width:5,height:5,borderRadius:'50%',background:G,flexShrink:0,display:'inline-block'}}/>{sp}
                  </li>))}
              </ul>
              <div style={{fontSize:'.77rem',color:'#c8e6c9',lineHeight:1.6}}>{w.notes}</div>
            </div>))}
        </div>

        {r.timing?.length>0&&<>
          <Sec t="Best Times Today"/>
          <div style={{background:CA,border:`2px solid ${BO}`,borderRadius:6,padding:'10px 12px'}}>
            {r.timing.map((t,i,a)=>(
              <div key={i} style={{display:'flex',alignItems:'flex-start',gap:9,padding:'7px 0',fontSize:'.85rem',color:W,lineHeight:1.6,borderBottom:i<a.length-1?`1px solid ${BO}`:'none'}}>
                <span style={{fontSize:'1.1rem',flexShrink:0}}>{t.icon}</span>
                <div><div style={{...mono,fontSize:'.58rem',color:G,letterSpacing:1,textTransform:'uppercase',marginBottom:2,fontWeight:700}}>{t.label}</div>{t.detail}</div>
              </div>))}
          </div>
        </>}

        <Sec t="Gear & Rigs"/>
        <div style={{background:CA,border:`2px solid ${BO}`,borderRadius:6,padding:12}}>
          {(r.gear||[]).map((g,i,a)=>(
            <div key={i} style={{padding:'9px 0',borderBottom:i<a.length-1?`1px solid ${BO}`:'none'}}>
              <div style={{...serif,fontSize:'.92rem',color:G,letterSpacing:2,marginBottom:5,textTransform:'uppercase'}}>{g.species}</div>
              <div style={{fontSize:'.85rem',color:W,lineHeight:1.75}}>{g.recommendation}</div>
            </div>))}
        </div>

        <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:CA,border:`2px solid ${BO}`,borderRadius:6,marginTop:13}}>
          <div style={{...mono,fontSize:'.62rem',color:GR,textTransform:'uppercase',letterSpacing:1.5,whiteSpace:'nowrap',fontWeight:700}}>Bite Confidence</div>
          <div style={{flex:1,height:8,background:DA,borderRadius:4,border:`1px solid ${BO}`,overflow:'hidden'}}>
            <div style={{height:'100%',borderRadius:4,background:conf>=70?GR:OR,width:conf+'%'}}/>
          </div>
          <div style={{...serif,fontSize:'1.2rem',color:W,minWidth:40,textAlign:'right'}}>{conf}%</div>
        </div>
        <div style={{marginTop:8,...mono,fontSize:'.55rem',color:'#4a7a5a',textAlign:'center',lineHeight:1.7}}>
          {anyLive?'Live conditions: Open-Meteo + USGS · ':'Conditions estimated · '}{webStatus.includes('found')?'Web intel: live reports · ':''}Moon/solunar/sun: local calc St. Joseph MI
        </div>
      </div>)}

      <div style={{marginTop:36,textAlign:'center',...mono,fontSize:'.52rem',color:'#3a6a4a',letterSpacing:1,lineHeight:2}}>
        MOON · SOLUNAR · SUN: LOCAL CALC<br/>
        LIVE DATA: OPEN-METEO + USGS WATERSERVICES<br/>
        AI: ANTHROPIC CLAUDE (YOUR KEY)
      </div>

    </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
