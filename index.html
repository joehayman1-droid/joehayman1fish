// ── BASS SEASON COUNTDOWN ────────────────────────────────────────────────
function bassOpenerInfo() {
  const now = new Date();
  const year = now.getFullYear();
  // Last Saturday of May
  const may31 = new Date(year, 4, 31);
  const lastSat = new Date(may31);
  lastSat.setDate(31 - (may31.getDay() === 6 ? 0 : (may31.getDay() + 1) % 7 || 7));
  const diff = Math.ceil((lastSat - now) / 86400000);
  return { date: lastSat, daysAway: diff, dateStr: lastSat.toLocaleDateString('en-US', {month:'long', day:'numeric'}) };
}

// ── CALCULATIONS ──────────────────────────────────────────────────────────
function moonCalcDate(date){
  const age=((date.getTime()-new Date('2024-01-11').getTime())/86400000)%29.53;
  const lbl=age<1.5?'New Moon':age<7.5?'Wax Crescent':age<10?'1st Quarter':age<14?'Wax Gibbous':age<16?'Full Moon':age<22?'Wan Gibbous':age<25?'Last Quarter':'Wan Crescent';
  const base=6+(age/29.53*24)%12;
  const f=h=>{const hh=Math.floor(h)%24,mm=Math.round((h%1)*60);return `${hh>12?hh-12:hh||12}:${mm.toString().padStart(2,'0')} ${hh>=12?'PM':'AM'}`;};
  return{lbl,age:Math.round(age),pct:Math.round(age/29.53*100),m1:f(base),m2:f((base+12)%24),n1:f((base+6)%24),n2:f((base+18)%24)};
}
function sunCalcDate(date){
  const r=Math.PI/180;
  const d=Math.floor((date-new Date(date.getFullYear(),0,0))/86400000);
  const B=2*Math.PI*(d-1)/365;
  const eqT=229.18*(0.000075+0.001868*Math.cos(B)-0.032077*Math.sin(B)-0.014615*Math.cos(2*B)-0.04089*Math.sin(2*B));
  const decl=0.006918-0.399912*Math.cos(B)+0.070257*Math.sin(B)-0.006758*Math.cos(2*B)+0.000907*Math.sin(2*B)-0.002697*Math.cos(3*B)+0.00148*Math.sin(3*B);
  const ch=Math.cos(90.833*r)/(Math.cos(LAT*r)*Math.cos(decl))-Math.tan(LAT*r)*Math.tan(decl);
  const ha=Math.acos(Math.max(-1,Math.min(1,ch)))/r;
  const tz=(date.getMonth()>=2&&date.getMonth()<=10)?-5:-6;
  const sr=720-4*(LON+ha)-eqT+tz*60,ss=720-4*(LON-ha)-eqT+tz*60;
  const f=m=>{const h=Math.floor(m/60)%24,mn=Math.round(m%60);return `${h>12?h-12:h||12}:${mn.toString().padStart(2,'0')} ${h>=12?'PM':'AM'}`;};
  return{rise:f(sr),set:f(ss),gold:f(ss-45),dawn:f(sr-30)};
}
function timeAgo(ts){
  if(!ts)return '';
  const m=Math.round((Date.now()-ts)/60000);
  if(m<1)return 'just now';
  if(m<60)return `${m}m ago`;
  return `${Math.round(m/60)}h ago`;
}

// ── LIVE CONDITIONS ───────────────────────────────────────────────────────
async function fetchLive(){
  const out={data:{},flags:{},forecast:null,marineForecast:null};
  const dirs=['N','NE','E','SE','S','SW','W','NW'];

  // ── Core three fetches — proven working, isolated from LM temp ──────────
  await Promise.allSettled([

    // 1. Weather + 7-day forecast + hourly pressure (Open-Meteo)
    fetchWithTimeout(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,windspeed_10m,winddirection_10m,surface_pressure,weathercode,cloud_cover,precipitation&hourly=surface_pressure&daily=temperature_2m_max,temperature_2m_min,windspeed_10m_max,winddirection_10m_dominant,weathercode,precipitation_sum&timezone=America%2FChicago&past_days=2&forecast_days=7`)
      .then(r=>r.json()).then(d=>{
        const cur=d.current, ph=d.hourly?.surface_pressure||[];
        const trend=ph.length>12?ph[ph.length-1]-ph[ph.length-13]:0;
        out.pressureHistory=ph;
        out.data.airTemp=((cur.temperature_2m*9/5)+32).toFixed(0)+'°F';
        out.data.windMph=(cur.windspeed_10m*0.621371).toFixed(0);
        out.data.windDir=dirs[Math.round(cur.winddirection_10m/45)%8];
        out.data.wind=out.data.windMph+' mph '+out.data.windDir;
        out.data.pressure=Math.round(cur.surface_pressure)+' hPa';
        out.data.pTrend=trend<-1.5?'Falling ↓ — fish feeding':trend>1.5?'Rising ↑ — bite may slow':'Stable →';
        out.data.pTrendShort=trend<-1.5?'Falling ↓':trend>1.5?'Rising ↑':'Stable →';
        out.data.sky=cur.weathercode===0?'Clear':cur.weathercode<=3?'Partly cloudy':cur.weathercode<=49?'Overcast':cur.weathercode<=67?'Rain':'Storms';
        out.data.cloud=(cur.cloud_cover||0)+'%';
        out.data.precip=(cur.precipitation||0).toFixed(2)+' in';
        out.forecast=d.daily;
        out.hourlyForecast=d.hourly;
        out.flags.weather=true;
      }).catch(e=>{out.flags.weather=false;out.flags.wErr=e.message;}),

    // 2. Lake Michigan waves + forecast (Open-Meteo Marine — waves work for Great Lakes)
    fetchWithTimeout(`https://marine-api.open-meteo.com/v1/marine?latitude=42.0&longitude=-86.7&current=wave_height&daily=wave_height_max&timezone=America%2FChicago&forecast_days=7`)
      .then(r=>r.json()).then(d=>{
        const wh=d.current?.wave_height;
        const wf=wh!=null&&!isNaN(wh)?(wh*3.28084).toFixed(1):null;
        if(wf){out.data.lakeWaves=wf+' ft';out.data.waveFt=parseFloat(wf);out.data.lakeSafe=parseFloat(wf)<=2.0;
        out.data.lakeSafeLabel=parseFloat(wf)<=2.0?'✓ Lake boat OK':'⚠ Too rough';
        }
        out.marineForecast=d.daily;
        out.flags.marine=true;
      }).catch(()=>{out.flags.marine=false;}),

    // 3. St. Joseph River — USGS gauge 04101500 (flow, temp, stage)
    fetchWithTimeout(`https://waterservices.usgs.gov/nwis/iv/?sites=04101500&parameterCd=00060,00010,00065&format=json&period=PT6H`)
      .then(r=>r.json()).then(d=>{
        let cfs=null,tc=null,stage=null,stagePrev=null;
        for(const s of d.value?.timeSeries||[]){
          const code=s.variable?.variableCode?.[0]?.value, vals=s.values?.[0]?.value||[];
          if(code==='00060') cfs=parseFloat(vals[vals.length-1]?.value);
          if(code==='00010') tc=parseFloat(vals[vals.length-1]?.value);
          if(code==='00065'){stage=parseFloat(vals[vals.length-1]?.value);stagePrev=parseFloat(vals[0]?.value);}
        }
        if(cfs&&!isNaN(cfs)&&cfs>0) out.data.riverCfs=Math.round(cfs)+' cfs';
        if(tc&&!isNaN(tc)&&tc>0)  out.data.riverTemp=((tc*9/5)+32).toFixed(0)+'°F';
        out.data.riverCond=cfs==null?'unknown':cfs<800?'Low & clear':cfs<2000?'Normal flow':'High & stained';
        out.data.riverStage=(stage!=null&&stagePrev!=null)?(stage>stagePrev+0.1?'Rising ↑':stage<stagePrev-0.1?'Falling ↓':'Stable →'):'unknown';
        out.data.riverStageHt=stage?stage.toFixed(2)+' ft':null;
        out.flags.river=true;
      }).catch(()=>{out.flags.river=false;}),

  ]);

  // ── LM water temp — separate sequential fetch, cannot break waves/river ──
  try {
    // Primary: NOAA Tides & Currents — St. Joseph MI (near-shore, most fishing-relevant)
    const r1=await fetchWithTimeout('https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?station=9087079&product=water_temperature&datum=MLLW&time_zone=lst_ldt&units=english&format=json&date=latest');
    const d1=await r1.json();
    const t=d1.data?.[0]?.v;
    if(t&&parseFloat(t)>32&&parseFloat(t)<90){
      out.data.lakeTemp=parseFloat(t).toFixed(0)+'°F';
      out.data.lakeTempSource='St. Joseph Gauge';
    }
  } catch{}

  if(!out.data.lakeTemp){
    try {
      // Fallback: NOAA NDBC Buoy 45007 — Lake Michigan South (open lake)
      const r2=await fetchWithTimeout('https://www.ndbc.noaa.gov/data/realtime2/45007.txt');
      const txt=await r2.text();
      const lines=txt.split(/[\r\n]+/).filter(l=>l.trim()&&!l.startsWith('#'));
      if(lines.length>0){
        const parts=lines[0].split(/\s+/);
        const wvhtM=parseFloat(parts[8]);
        if(!isNaN(wvhtM)&&wvhtM>0&&wvhtM<15&&!out.data.lakeWaves){
          const wfB=(wvhtM*3.28084).toFixed(1);
          out.data.lakeWaves=wfB+' ft';
          out.data.waveFt=parseFloat(wfB);
          out.data.lakeSafe=parseFloat(wfB)<=2.0;
          out.data.lakeSafeLabel=parseFloat(wfB)<=2.0?'✓ OK (buoy)':'⚠ Rough (buoy)';
          out.flags.marine=true;
        }
        const wtmpC=parseFloat(parts[14]);
        if(!isNaN(wtmpC)&&wtmpC>0&&wtmpC<35){
          out.data.lakeTemp=((wtmpC*9/5)+32).toFixed(0)+'°F';
          out.data.lakeTempSource='NDBC Buoy 45007';
        }
      }
    } catch{}
  }

  return out;
}


// ── FETCH WITH TIMEOUT ──────────────────────────────────────────────────
async function fetchWithTimeout(url, ms=12000) {
  const ctrl = new AbortController();
  const id    = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, {signal: ctrl.signal});
    clearTimeout(id);
    return r;
  } catch(e) {
    clearTimeout(id);
    throw e;
  }
}

// ── WATER CLARITY INTERPRETATION ────────────────────────────────────────
function interpretClarity(cfsStr) {
  if (!cfsStr) return null;
  const cfs = parseInt(cfsStr.replace(/[^0-9]/g,''));
  if (cfs < 500)  return { label:'Low & Crystal Clear', color:'#60d4f0', gear:'Natural colors, finesse rigs, light line. Fish can see everything.' };
  if (cfs < 1200) return { label:'Normal & Clear',      color:'#4a9be0', gear:'Natural to mildly bright colors. Standard presentations.' };
  if (cfs < 2500) return { label:'Slightly Stained',    color:'#a0784a', gear:'Brighter colors — chartreuse, white, orange. Add rattles.' };
  if (cfs < 4000) return { label:'High & Stained',      color:'#8a5030', gear:'Loud colors — chartreuse, hot orange. Rattling lures, bigger profiles. Fish slow.' };
  return           { label:'Flood Conditions',           color:'#6a3820', gear:'Target slack water edges, flooded timber, current seams. Very slow presentation.' };
}

const MODELS=['claude-sonnet-4-20250514','claude-haiku-4-5-20251001','claude-opus-4-20250514'];
async function callClaude(apiKey,body){
  for(const model of MODELS){
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({...body,model})
    });
    const raw=await resp.text();
    const data=JSON.parse(raw);
    if(data.type==='error'&&data.error?.message?.startsWith('model:'))continue;
    return{raw,data,model};
  }
  throw new Error('No Claude model available — check API key at console.anthropic.com');
}

// ── PARSE REPORT ──────────────────────────────────────────────────────────
function parseReport(text){
  const get=tag=>{const m=text.match(new RegExp(`<${tag}>([\\s\\S]*?)<\\/${tag}>`));return m?m[1].trim():'';};
  const getAll=tag=>{const res=[];const re=new RegExp(`<${tag}>([\\s\\S]*?)<\\/${tag}>`,'g');let m;while((m=re.exec(text))!==null)res.push(m[1].trim());return res;};
  const field=(b,k)=>{const m=b.match(new RegExp(`^${k}:\\s*(.+)$`,'m'));return m?m[1].trim():'';};
  return{
    confidence:parseInt(get('confidence'))||75,
    confidenceReason:get('confidence_reason'),
    narrative:get('narrative'),
    intel:getAll('intel').map(i=>({finding:field(i,'finding'),source:field(i,'source')})).filter(i=>i.finding),

function Sparkline({values}){
  if(!values||values.length<4)return null;
  const pts=values.slice(-48);
  const mn=Math.min(...pts)-0.5,mx=Math.max(...pts)+0.5;
  const W=300,H=40;
  const path=pts.map((v,i)=>`${((i/(pts.length-1))*W).toFixed(1)},${(H-((v-mn)/(mx-mn))*H).toFixed(1)}`).join(' ');
  const trend=pts[pts.length-1]-pts[0];
  const col=trend<-1.5?'#4ade80':trend>1.5?'#f87171':'#f5c842';
  const lbl=trend<-1.5?'Falling ↓ — fish feeding':trend>1.5?'Rising ↑ — bite may slow':'Stable →';
  return(
    <div style={{background:`${DA}`,border:`2px solid ${BO}`,borderRadius:6,padding:'9px 12px',marginBottom:9}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,flexWrap:'wrap',gap:3}}>
        <span style={{fontFamily:'monospace',fontSize:'.57rem',color:GR,fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>48-Hr Pressure · LIVE</span>
        <span style={{fontFamily:'monospace',fontSize:'.6rem',color:col,fontWeight:700}}>{lbl}</span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:34,display:'block'}}>
        <polyline points={path} fill="none" stroke={col} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
        <circle cx={W} cy={(H-((pts[pts.length-1]-mn)/(mx-mn))*H).toFixed(1)} r="3.5" fill={col}/>
      </svg>
      <div style={{display:'flex',justifyContent:'space-between',fontFamily:'monospace',fontSize:'.52rem',color:'#9A9BA3',marginTop:2}}>
        <span>48 hrs ago</span><span>now</span>
      </div>
    </div>
  );
}

// ── GET FORECAST CONDITIONS FOR A SPECIFIC DAY ────────────────────────────
function getForecastDay(forecast, marineForecast, hourly, dayIdx) {
  if(!forecast||dayIdx===0)return null;
  const i=dayIdx;
  const dirs=['N','NE','E','SE','S','SW','W','NW'];
  const wf=marineForecast?.wave_height_max?.[i];
  const waveFt=wf!=null&&!isNaN(wf)?(wf*3.28084).toFixed(1):null;
  const tMax=forecast.temperature_2m_max?.[i];
  const tMin=forecast.temperature_2m_min?.[i];
  const avgTF=tMax!=null&&tMin!=null?(((tMax+tMin)/2*9/5)+32).toFixed(0)+'°F':null;
  const wCode=forecast.weathercode?.[i]||0;
  const sky=wCode===0?'Clear':wCode<=3?'Partly cloudy':wCode<=49?'Overcast':wCode<=67?'Rain':'Storms';
  const wSpd=forecast.windspeed_10m_max?.[i];
  const wDir=forecast.winddirection_10m_dominant?.[i];
  const precip=forecast.precipitation_sum?.[i];
  let pAvg=null;
  if(hourly?.surface_pressure&&hourly?.time){
    const dayStr=forecast.time?.[i];
    const dayPressures=hourly.surface_pressure.filter((_,j)=>hourly.time[j]?.startsWith(dayStr));
    if(dayPressures.length)pAvg=Math.round(dayPressures.reduce((a,b)=>a+b,0)/dayPressures.length);
  }
  const windMph=wSpd!=null?(wSpd*0.621371).toFixed(0):null;
  const windDirStr=wDir!=null?dirs[Math.round(wDir/45)%8]:null;
  return {
    airTemp:avgTF,
    tempRange:tMax!=null&&tMin!=null?`${((tMin*9/5)+32).toFixed(0)}–${((tMax*9/5)+32).toFixed(0)}°F`:null,
    wind:windMph&&windDirStr?windMph+' mph '+windDirStr:windMph?windMph+' mph':null,
    windMph, windDir:windDirStr,
    sky, cloud:null,
    pressure:pAvg?pAvg+' hPa':null,
    pTrend:'Forecast — trend N/A', pTrendShort:'Forecast',
    lakeWaves:waveFt?waveFt+' ft':null,
    waveFt:waveFt?parseFloat(waveFt):null,
    lakeSafe:waveFt!=null?parseFloat(waveFt)<=2.0:null,
    lakeSafeLabel:waveFt!=null?(parseFloat(waveFt)<=2.0?'✓ Lake boat OK':'⚠ Too rough'):null,
    riverCfs:null, riverTemp:null, riverCond:'forecast N/A', riverStage:'N/A',
    precip:precip!=null?precip.toFixed(2)+' in':null,
    isForecast:true,
  };
}

═══════════════════════════════════════════════════════════

BAROMETRIC PRESSURE RULES:
- Below 1000 hPa: Low pressure system. Fish typically feed aggressively BEFORE the front. If pressure is currently falling through low range, bite is likely ON.

- Rapid drop (>3 hPa in 3hrs): Feeding frenzy incoming. Fish know a storm is coming.
- Extended stable pressure 24hrs+: Fish settle into predictable patterns. Easier to pattern them.

WIND DIRECTION FISHING PRINCIPLES (meteorologically validated):
- SOUTH wind: Warm front pushing in, rising temps, falling pressure. Usually GOOD fishing. "Wind from the south, bait in their mouth."
- WEST wind: Post-front clearing, stable pressure. Often GOOD once fish adjust.
- NORTH wind: Cold front, falling temps, rising pressure. Tough bite. Fish go deep.
- EAST wind: Unusual pressure pattern, unsettled weather. Consistently poor fishing. "Wind from the east, fish bite least." Advise cautiously.

WATER CLARITY → GEAR SELECTION (critical — apply every time):
- Crystal clear (below 600 cfs, clear conditions): Natural colors, 6lb fluorocarbon, small profiles, finesse. Fish are wary.
- Slightly stained: Chartreuse, white, light firetiger. Can upsize slightly.
- Stained (2000-4000 cfs): BRIGHT — hot chartreuse, orange, white. Rattling lures. Bigger profiles. Slow your retrieve — fish locate by vibration.
- High/Flood (4000+ cfs): Target slack water, flooded timber, current breaks. Very slow presentation. Bright colors only.

WATER TEMPERATURE → SPECIES ACTIVITY (apply to current river/lake temp):
- Northern Pike: Peak 45-65°F. Post-spawn and aggressive in May at these temps. Slow down above 70°F.
- Walleye: Peak 50-68°F. Upper range slowing. Night bite intensifies as temps rise above 65°F.
- Smallmouth Bass: Peak 60-72°F. PRIME TIME at 65-70°F. This is the crayfish molt window.
- Largemouth Bass: Peak 65-80°F. Pre-spawn staging 58-65°F; bedding 62-68°F.
- Steelhead: Active 38-55°F. Done for spring run above 60°F.
- Crappie: Peak 58-68°F. Spawn staging in shallows May-June.
- Bluegill: Peak 68-80°F. Just starting to become active in May.
- Channel Catfish: Peak 70-85°F. Warming up in May, most active June-August.
- Flathead Catfish: Peak 75-85°F. Night feeders, deep holes. Live bait only — live bluegill 6-10in.
- Brown Trout: Active year-round. Prefer 52-65°F. Rivers with cold spring inputs hold them in summer.
- Rainbow Trout (stocked): Most active and catchable 2-3 weeks post-stocking. 50-65°F.
- Carp: Peak 65-80°F. Spawning in May-June in shallows.

CRAYFISH MOLT — THE #1 SMALLMOUTH TRIGGER:
- When river water reaches 58-65°F in spring, crayfish enter their soft-shell molt cycle.
- Soft-shell crayfish (unable to defend themselves) are the most vulnerable and highest-calorie food available.
- Smallmouth bass key in on soft-shells HEAVILY during this window — their strike aggression is at its peak.
- This explains why May-early June on warming rivers like the St. Joe is often the best smallmouth fishing of the year.
- Lure match: crayfish-colored tubes, brown/orange soft plastics, crawdad-colored crankbaits running bottom.
- If current river temp is 58-68°F, ALWAYS mention the crayfish molt in smallmouth recommendations.

SPAWN STAGE → FISH LOCATION:
- Pre-spawn (bass at 52-62°F): Fish transitioning from deep winter holes toward spawning flats. Target points, ledges, rocky transitions.
- Spawn (bass 62-68°F): On beds in 1-5ft over gravel/sand. Sight fishing. Territorial but often non-feeding — use reaction baits or persistently target bedding fish.
- Post-spawn (above 68°F): Fish scattered and recovering. Hard to pattern. Target females in deeper water, males guarding fry in shallows.
- Northern Pike: Post-spawn in May. Aggressive and feeding actively to recover weight. Target weed edges and submerged structure.
- Walleye: Post-spawn. Dispersing to summer locations. Transition structure and rock points.
- Crappie: Pre-spawn to spawn in May-June. Staging near brushpiles and dock pilings in 4-10ft.

RIVER STAGE IMPLICATIONS:
- Rising water: Fish move OUT of main channel into flooded timber, vegetation, bank edges. Current is too strong in main flow.
- Falling water: Fish concentrate back into main channel seams, current breaks behind boulders, deeper pools.
- High & stained: Forget finesse. Loud, vibrating, bright. Fish cannot see more than 12 inches.

CLOUD COVER FISHING IMPACT:
- Overcast (70%+ cloud): Fish move shallower and feed more confidently. Less light penetration = bolder fish. Often BEST conditions.
- Partly cloudy: Good. Fish use cloud breaks to ambush from structure.
- Full sun/bluebird: Tough. Fish go deep and tight to cover. Low and slow. Edges of shadows.

SOLUNAR FEEDING WINDOWS — HOW TO USE:
- Major windows (2hrs each): Fish are physiologically triggered to feed during these windows regardless of other factors.
- Minor windows (1hr each): Shorter bursts of activity.
- Stacking: When a major feed window OVERLAPS with dawn/dusk golden hour, this is a prime-time event — reference this specifically when it occurs.
- Moon overhead/underfoot: Movement peaks when moon is directly overhead (noon moon) or underfoot (midnight moon).

MICHIGAN SALMON & STEELHEAD SEASONAL CALENDAR — NON-NEGOTIABLE:
- Steelhead: SPRING run March-May (rivers), FALL run October-November. Late May = run winding down. Water above 58°F = steelhead moving back to lake.
- Chinook Salmon: FALL ONLY in rivers — September-October. In May they are in DEEP LAKE MICHIGAN (60-120ft). NOT in rivers. NOT near shore. NEVER recommend Chinook in rivers in spring.
- Coho Salmon: FALL ONLY in rivers — October-November. Same absolute rule.
- Brown Trout: Year-round in rivers; spring (April-May) and fall (Sept-Oct) peaks.
- DNR Stocked Rainbow Trout: Most catchable 0-3 weeks after stocking.
- Muskellunge / Tiger Musky: Bankson Lake (Van Buren Co.) is the premier musky lake in SW Michigan. Best in fall (Sept-Nov) and early summer (June-July). Large bucktails, jerkbaits, figure-8 at boatside. Minimum size 48 inches — handle with extreme care. Ask web search for recent stocking dates.
- SMALL TRIBUTARIES (Galien, Hickory Creek, Paw Paw River) IN MAY: Warmwater species ONLY — bass, pike, catfish, bullhead, carp, crayfish-targeting smallmouth. No salmon recommendations.

              <div style={{height:'100%',borderRadius:3,background:conf>=70?'linear-gradient(90deg,#4ADE80,#22c55e)':'linear-gradient(90deg,#FFB84D,#ff9a28)',width:conf+'%',boxShadow:conf>=70?'0 0 8px rgba(74,222,128,0.35)':'0 0 8px rgba(255,184,77,0.35)'}}/>
            </div>
            <div style={{...mono,fontSize:'1.25rem',fontWeight:600,color:'#F5F7FA',minWidth:44,textAlign:'right'}}>{conf}%</div>
          </div>
          {r.confidenceReason&&<div style={{fontSize:'.75rem',color:'#94A3B8',lineHeight:1.55,paddingTop:9,borderTop:'1px solid rgba(255,255,255,0.05)'}}>{r.confidenceReason}</div>}
        </div>

        <div style={{...mono,fontSize:'.52rem',color:'#2d3748',textAlign:'center',marginTop:14,lineHeight:2}}>
          {anyLive?'Live: Open-Meteo + NOAA + USGS · ':'Conditions estimated · '}Intel: DNR + FishBrain + In-Fisherman<br/>Moon/Solunar/Sun: Local calc · AI: Anthropic Claude
        </div>

      </div>)}

      <div style={{marginTop:44,textAlign:'center',...mono,fontSize:'.5rem',color:'#1a2535',letterSpacing:'0.08em',lineHeight:2,paddingBottom:8}}>
        CONFLUENCE · SW MICHIGAN<br/>
        WATER · WEATHER · FISH
      </div>
    </div>
  </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
