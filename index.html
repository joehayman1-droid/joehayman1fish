// ── CALCULATIONS ──────────────────────────────────────────────────────────
function moonCalcDate(date){
  const age=((date.getTime()-new Date('2024-01-11').getTime())/86400000)%29.53;
  const lbl=age<1.5?'New Moon':age<7.5?'Wax Crescent':age<10?'1st Quarter':age<14?'Wax Gibbous':age<16?'Full Moon':age<22?'Wan Gibbous':age<25?'Last Quarter':'Wan Crescent';
  const base=6+(age/29.53*24)%12;
  const f=h=>{const hh=Math.floor(h)%24,mm=Math.round((h%1)*60);return `${hh>12?hh-12:hh||12}:${mm.toString().padStart(2,'0')} ${hh>=12?'PM':'AM'}`;};
  return{lbl,age:Math.round(age),pct:Math.round(age/29.53*100),m1:f(base),m2:f((base+12)%24),n1:f((base+6)%24),n2:f((base+18)%24)};
}
function sunCalcDate(date){
  const r=Math.PI/180;
  const d=Math.floor((date-new Date(date.getFullYear(),0,0))/86400000);
  const B=2*Math.PI*(d-1)/365;
  const eqT=229.18*(0.000075+0.001868*Math.cos(B)-0.032077*Math.sin(B)-0.014615*Math.cos(2*B)-0.04089*Math.sin(2*B));
  const decl=0.006918-0.399912*Math.cos(B)+0.070257*Math.sin(B)-0.006758*Math.cos(2*B)+0.000907*Math.sin(2*B)-0.002697*Math.cos(3*B)+0.00148*Math.sin(3*B);
  const ch=Math.cos(90.833*r)/(Math.cos(LAT*r)*Math.cos(decl))-Math.tan(LAT*r)*Math.tan(decl);
  const ha=Math.acos(Math.max(-1,Math.min(1,ch)))/r;
  const tz=(date.getMonth()>=2&&date.getMonth()<=10)?-5:-6;
  const sr=720-4*(LON+ha)-eqT+tz*60,ss=720-4*(LON-ha)-eqT+tz*60;
  const f=m=>{const h=Math.floor(m/60)%24,mn=Math.round(m%60);return `${h>12?h-12:h||12}:${mn.toString().padStart(2,'0')} ${h>=12?'PM':'AM'}`;};
  return{rise:f(sr),set:f(ss),gold:f(ss-45),dawn:f(sr-30)};
}
function timeAgo(ts){
  if(!ts)return '';
  const m=Math.round((Date.now()-ts)/60000);
  if(m<1)return 'just now';
  if(m<60)return `${m}m ago`;
  return `${Math.round(m/60)}h ago`;
}

// ── LIVE CONDITIONS ───────────────────────────────────────────────────────
async function fetchLive(){
  const out={data:{},flags:{},forecast:null,marineForecast:null};
  const dirs=['N','NE','E','SE','S','SW','W','NW'];
  await Promise.allSettled([
    // Weather current + 7-day forecast + hourly pressure
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,windspeed_10m,winddirection_10m,surface_pressure,weathercode,cloud_cover,precipitation&hourly=surface_pressure&daily=temperature_2m_max,temperature_2m_min,windspeed_10m_max,winddirection_10m_dominant,weathercode,precipitation_sum&timezone=America%2FChicago&past_days=2&forecast_days=7`)
      .then(r=>r.json()).then(d=>{
        const c=d.current,ph=d.hourly?.surface_pressure||[];
        const trend=ph.length>12?ph[ph.length-1]-ph[ph.length-13]:0;
        out.pressureHistory=ph;
        out.data.airTemp=((c.temperature_2m*9/5)+32).toFixed(0)+'°F';
        out.data.wind=((c.windspeed_10m*0.621371).toFixed(0))+' mph '+dirs[Math.round(c.winddirection_10m/45)%8];
        out.data.windMph=(c.windspeed_10m*0.621371).toFixed(0);
        out.data.windDir=dirs[Math.round(c.winddirection_10m/45)%8];
        out.data.pressure=Math.round(c.surface_pressure)+' hPa';
        out.data.pTrend=trend<-1.5?'Falling ↓ — fish feeding':trend>1.5?'Rising ↑ — bite may slow':'Stable →';
        out.data.pTrendShort=trend<-1.5?'Falling ↓':trend>1.5?'Rising ↑':'Stable →';
        out.data.sky=c.weathercode===0?'Clear':c.weathercode<=3?'Partly cloudy':c.weathercode<=49?'Overcast':c.weathercode<=67?'Rain':'Storms';
        out.data.cloud=(c.cloud_cover||0)+'%';
        out.data.precip=(c.precipitation||0).toFixed(2)+' in';
        // Store 7-day forecast
        out.forecast=d.daily;
        out.hourlyForecast=d.hourly;
        out.flags.weather=true;
      }).catch(e=>{out.flags.weather=false;out.flags.wErr=e.message;}),
    // Marine current + 7-day forecast
    fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=42.0&longitude=-86.7&current=wave_height,sea_surface_temperature&daily=wave_height_max,sea_surface_temperature_max&timezone=America%2FChicago&forecast_days=7`)
      .then(r=>r.json()).then(d=>{
        const wf=(d.current.wave_height*3.28084).toFixed(1);
        out.data.lakeWaves=wf+' ft';
        out.data.waveFt=parseFloat(wf);
        out.data.lakeSafe=parseFloat(wf)<=2.0;
        out.data.lakeSafeLabel=parseFloat(wf)<=2.0?'✓ Lake boat OK':'⚠ Too rough';
        if(d.current.sea_surface_temperature) out.data.lakeTemp=((d.current.sea_surface_temperature*9/5)+32).toFixed(0)+'°F';
        out.marineForecast=d.daily;
        out.flags.marine=true;
      }).catch(e=>{out.flags.marine=false;}),
    // River
    fetch(`https://waterservices.usgs.gov/nwis/iv/?sites=04101500&parameterCd=00060,00010,00065&format=json&period=PT26H`)
      .then(r=>r.json()).then(d=>{
        let cfs=null,tc=null,stage=null,stagePrev=null;
        for(const s of d.value?.timeSeries||[]){
          const code=s.variable?.variableCode?.[0]?.value,vals=s.values?.[0]?.value||[];
          if(code==='00060')cfs=parseFloat(vals[vals.length-1]?.value);
          if(code==='00010')tc=parseFloat(vals[vals.length-1]?.value);
          if(code==='00065'){stage=parseFloat(vals[vals.length-1]?.value);stagePrev=parseFloat(vals[0]?.value);}
        }
        if(cfs)out.data.riverCfs=Math.round(cfs)+' cfs';
        if(tc)out.data.riverTemp=((tc*9/5)+32).toFixed(0)+'°F';
        out.data.riverCond=cfs==null?'unknown':cfs<800?'Low & clear':cfs<2000?'Normal flow':'High & stained';
        out.data.riverStage=(stage!=null&&stagePrev!=null)?(stage>stagePrev+0.1?'Rising ↑':stage<stagePrev-0.1?'Falling ↓':'Stable →'):'unknown';
        out.data.riverStageHt=stage?stage.toFixed(2)+' ft':null;
        out.flags.river=true;
      }).catch(e=>{out.flags.river=false;}),
  ]);
  return out;
}

// ── GET FORECAST CONDITIONS FOR A DAY ────────────────────────────────────
function getForecastDay(forecast, marineForecast, hourly, dayIdx) {
  if(!forecast||dayIdx===0)return null;
  const i=dayIdx;
  const dirs=['N','NE','E','SE','S','SW','W','NW'];
  const wf=marineForecast?.wave_height_max?.[i];
  const waveFt=wf?(wf*3.28084).toFixed(1):null;
  const tMax=forecast.temperature_2m_max?.[i];
  const tMin=forecast.temperature_2m_min?.[i];
  const avgTF=tMax&&tMin?(((tMax+tMin)/2*9/5)+32).toFixed(0)+'°F':null;
  const wCode=forecast.weathercode?.[i]||0;
  const sky=wCode===0?'Clear':wCode<=3?'Partly cloudy':wCode<=49?'Overcast':wCode<=67?'Rain':'Storms';
  const wSpd=forecast.windspeed_10m_max?.[i];
  const wDir=forecast.winddirection_10m_dominant?.[i];
  // Get avg pressure for that day from hourly
  let pAvg=null;
  if(hourly?.surface_pressure&&hourly?.time){
    const dayStr=forecast.time?.[i];
    const dayPressures=hourly.surface_pressure.filter((_,j)=>hourly.time[j]?.startsWith(dayStr));
    if(dayPressures.length)pAvg=Math.round(dayPressures.reduce((a,b)=>a+b,0)/dayPressures.length);
  }
  return{
    airTemp:avgTF, tempRange:tMax&&tMin?`${((tMin*9/5)+32).toFixed(0)}–${((tMax*9/5)+32).toFixed(0)}°F`:null,
    wind:wSpd?(((wSpd*0.621371).toFixed(0))+' mph '+(wDir!=null?dirs[Math.round(wDir/45)%8]:'')):null,
    sky, pressure:pAvg?pAvg+' hPa':null,
    lakeWaves:waveFt?waveFt+' ft':null, waveFt:waveFt?parseFloat(waveFt):null,
    lakeSafe:waveFt?parseFloat(waveFt)<=2.0:null,
    lakeSafeLabel:waveFt?(parseFloat(waveFt)<=2.0?'✓ Lake boat OK':'⚠ Too rough'):null,
    precip:forecast.precipitation_sum?.[i]?.toFixed(2)+' in',
    isForecast:true,
  };
}

// ── MODELS + CLAUDE CALLER ────────────────────────────────────────────────
const MODELS=['claude-sonnet-4-20250514','claude-haiku-4-5-20251001','claude-opus-4-20250514'];
async function callClaude(apiKey,body){
  for(const model of MODELS){
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({...body,model})
    });
    const raw=await resp.text();
    const data=JSON.parse(raw);
    if(data.type==='error'&&data.error?.message?.startsWith('model:'))continue;
    return{raw,data,model};
  }
  throw new Error('No Claude model available — check API key at console.anthropic.com');
}

// ── PARSE REPORT ──────────────────────────────────────────────────────────
function parseReport(text){
  const get=tag=>{const m=text.match(new RegExp(`<${tag}>([\\s\\S]*?)<\\/${tag}>`));return m?m[1].trim():'';};
  const getAll=tag=>{const res=[];const re=new RegExp(`<${tag}>([\\s\\S]*?)<\\/${tag}>`,'g');let m;while((m=re.exec(text))!==null)res.push(m[1].trim());return res;};
  const field=(b,k)=>{const m=b.match(new RegExp(`^${k}:\\s*(.+)$`,'m'));return m?m[1].trim():'';};
  return{
    confidence:parseInt(get('confidence'))||75,
    narrative:get('narrative'),
    intel:getAll('intel').map(i=>({finding:field(i,'finding'),source:field(i,'source')})).filter(i=>i.finding),
    waters:getAll('water').map(w=>({name:field(w,'name'),boat:field(w,'boat'),topPick:field(w,'top')==='yes',species:field(w,'species').split(',').map(s=>s.trim()).filter(Boolean),notes:field(w,'notes')})).filter(w=>w.name),
    timing:getAll('time').map(t=>({icon:field(t,'icon'),label:field(t,'label'),detail:field(t,'detail')})).filter(t=>t.label),
    gear:getAll('gear').map(g=>({species:field(g,'species'),recommendation:field(g,'rec')})).filter(g=>g.species),
  };
}

// ── BUILD SHARE TEXT ──────────────────────────────────────────────────────
function buildShareText(r,cond,moon,sun,ctx,targetDate){
  const lines=[
    `🎣 BERRIEN FISH REPORT — ${ctx}`,
    `📅 ${targetDate.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}`,
    ``,
    `CONDITIONS:`,
    cond.airTemp?`🌡 Air: ${cond.airTemp} · ${cond.sky}`:'',
    cond.wind?`💨 Wind: ${cond.wind}`:'',
    cond.pressure?`📊 Pressure: ${cond.pressure} · ${cond.pTrendShort||''}`:'',
    cond.lakeWaves?`🌊 LM Waves: ${cond.lakeWaves} (${cond.lakeSafeLabel})`:'',
    cond.riverCfs?`🏞 River: ${cond.riverCfs} · ${cond.riverCond}`:'',
    cond.riverTemp?`🌡 River Temp: ${cond.riverTemp}`:'',
    `🌙 Moon: ${moon.lbl} (${moon.age}d · ${moon.pct}%)`,
    `⏰ Major feed: ${moon.m1}, ${moon.m2}`,
    `🌅 Sunrise: ${sun.rise} · Sunset: ${sun.set}`,
    ``,
    `REPORT:`,
    r.narrative||'',
    ``,
    `WHERE TO GO:`,
    ...(r.waters||[]).map(w=>`• ${w.name} (${w.boat})\n  ${w.species.join(', ')}\n  ${w.notes}`),
    ``,
    `GEAR:`,
    ...(r.gear||[]).map(g=>`• ${g.species}: ${g.recommendation}`),
    ``,
    `Bite Confidence: ${r.confidence}%`,
    `— Berrien Fish Report`,
  ];
  return lines.filter(l=>l!=='').join('\n');
}

// ── SPARKLINE ─────────────────────────────────────────────────────────────
function Sparkline({values}){
  if(!values||values.length<4)return null;
  const pts=values.slice(-48);
  const mn=Math.min(...pts)-0.5,mx=Math.max(...pts)+0.5;
  const W=300,H=40;
  const path=pts.map((v,i)=>`${((i/(pts.length-1))*W).toFixed(1)},${(H-((v-mn)/(mx-mn))*H).toFixed(1)}`).join(' ');
  const trend=pts[pts.length-1]-pts[0];
  const col=trend<-1.5?'#4ade80':trend>1.5?'#f87171':'#f5c842';
  const lbl=trend<-1.5?'Falling ↓ — fish feeding':trend>1.5?'Rising ↑ — bite may slow':'Stable →';
  return(
    <div style={{background:'#0e2014',border:'2px solid #2a5c35',borderRadius:6,padding:'9px 12px',marginBottom:9}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,flexWrap:'wrap',gap:3}}>
        <span style={{fontFamily:'monospace',fontSize:'.57rem',color:'#4ade80',fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>48-Hr Pressure · LIVE</span>
        <span style={{fontFamily:'monospace',fontSize:'.6rem',color:col,fontWeight:700}}>{lbl}</span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:34,display:'block'}}>
        <polyline points={path} fill="none" stroke={col} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
        <circle cx={W} cy={(H-((pts[pts.length-1]-mn)/(mx-mn))*H).toFixed(1)} r="3.5" fill={col}/>
      </svg>
      <div style={{display:'flex',justifyContent:'space-between',fontFamily:'monospace',fontSize:'.52rem',color:'#6aad7a',marginTop:2}}>
        <span>48 hrs ago</span><span>now</span>
      </div>
    </div>
  );
}

    {/* DAY SELECTOR */}
    {forecastDays&&(
      <div style={{marginBottom:10}}>
        <div style={{...mono,fontSize:'.58rem',color:'#888',textTransform:'uppercase',letterSpacing:2,marginBottom:6}}>📅 Report for:</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {dayBtns.map(({idx,label,date,waveFt:wft,safe})=>(
            <button key={idx}
              style={{padding:'7px 12px',borderRadius:6,border:dayOffset===idx?`2px solid ${G}`:`2px solid ${BO}`,background:dayOffset===idx?G:CA,color:dayOffset===idx?'#000':W,cursor:'pointer',...mono,fontSize:'.67rem',fontWeight:dayOffset===idx?700:400,textAlign:'center'}}
              onClick={()=>{setDayOffset(idx);setReport(null);}}>
              <div style={{fontWeight:700}}>{label}</div>
              {wft!=null&&<div style={{fontSize:'.52rem',marginTop:2,color:dayOffset===idx?'#333':(safe?'#4ade80':'#f87171')}}>LM: {wft.toFixed?wft.toFixed(1):wft}ft {safe?'✓':'⚠'}</div>}
            </button>
          ))}
        </div>
      </div>
    )}

    {/* CONDITIONS STATUS + REFRESH */}
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:7}}>
      <div style={{...mono,fontSize:'.58rem',color:anyLive?GR:'#666',display:'flex',alignItems:'center',gap:6}}>
        <span style={{width:6,height:6,borderRadius:'50%',background:anyLive?GR:'#444',display:'inline-block',flexShrink:0}}/>
        {condLoading?'Loading live conditions...':`${anyLive?'LIVE: weather · waves · river gauge':'Conditions unavailable'} · Updated ${timeAgo(lastUpdated)}`}
      </div>
      <button onClick={loadConditions} disabled={condLoading}
        style={{...mono,fontSize:'.6rem',color:condLoading?'#444':GR,background:'transparent',border:`1px solid ${condLoading?'#333':BO}`,borderRadius:4,padding:'4px 9px',cursor:condLoading?'not-allowed':'pointer'}}>
        {condLoading?'⏳':'↻ Refresh'}
      </button>
    </div>

    {/* DATA CARDS */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(108px,1fr))',gap:6,marginBottom:7}}>
      <Card l="Moon Phase" v={moon.lbl}                              s={`${moon.age}d · ${moon.pct}%`}/>
      <Card l="Sunrise"    v={sun.rise}                              s={`Dawn: ${sun.dawn}`}/>
      <Card l="Sunset"     v={sun.set}                               s={`Golden: ${sun.gold}`}/>
      <Card l="Air Temp"   v={displayCond.airTemp||'—'}              s={displayCond.sky||''}             live={!!liveData.airTemp}  forecast={isForecast}/>
      <Card l="Wind"       v={displayCond.windMph?displayCond.windMph+' mph':'—'} s={displayCond.windDir||''} live={!!liveData.wind} forecast={isForecast}/>
      <Card l="Pressure"   v={displayCond.pressure||'—'}             s={!isForecast?(displayCond.pTrendShort||''):'forecast avg'} live={!!liveData.pressure} forecast={isForecast}/>
      <Card l="LM Waves"   v={displayCond.lakeWaves||'—'}            s={displayCond.lakeSafeLabel||''}   live={!!liveData.lakeWaves} forecast={isForecast}/>
      <Card l="LM Temp"    v={displayCond.lakeTemp||liveData.lakeTemp||'—'} s="Surface temp"           live={!!liveData.lakeTemp}/>
      <Card l="River Flow" v={liveData.riverCfs||'—'}                s={liveData.riverCond||''}          live={!!liveData.riverCfs}/>
      <Card l="River Temp" v={liveData.riverTemp||'—'}               s={liveData.riverStage||(liveData.riverStageHt?liveData.riverStageHt:'')} live={!!liveData.riverTemp}/>
    </div>

    {/* PRESSURE SPARKLINE */}
    {!isForecast&&<Sparkline values={pressHist}/>}

    {/* SOLUNAR */}
    <div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:12,alignItems:'center'}}>
      {[['MAJOR',moon.m1,moon.m2],['MINOR',moon.n1,moon.n2]].map(([lbl,t1,t2],i)=>(
        <div key={i} style={{display:'flex',gap:5,alignItems:'center',marginLeft:i?5:0}}>
          <span style={{...mono,fontSize:'.58rem',fontWeight:700,textTransform:'uppercase',padding:'4px 7px',borderRadius:4,background:G,color:'#000'}}>{lbl} FEED</span>
          {[t1,t2].map((t,j)=><span key={j} style={{...mono,fontSize:'.67rem',padding:'4px 10px',borderRadius:4,border:`2px solid ${BO}`,background:CA,color:W,fontWeight:700}}>{t}</span>)}
        </div>
      ))}
    </div>

    {/* CACHED REPORT NOTICE */}
    {cachedReport&&!report&&(
      <div style={{background:DA,border:`1px solid ${BO}`,borderRadius:6,padding:'7px 12px',marginBottom:9,...mono,fontSize:'.6rem',color:'#888',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span>💾 Last: {cachedReport.mName} · {cachedReport.waterSel?.label||cachedReport.target||'General'} · {timeAgo(cachedReport.ts)}</span>
        <button onClick={()=>setReport(cachedReport.report)} style={{background:'transparent',color:G,border:`1px solid ${BO}`,borderRadius:3,padding:'3px 8px',cursor:'pointer',...mono,fontSize:'.58rem'}}>Load</button>
      </div>
    )}

    {webStatus&&<div style={{...mono,fontSize:'.6rem',color:'#6aad7a',marginBottom:6}}>{webStatus}</div>}

    {/* CTA */}
    <div style={{textAlign:'center',margin:'12px 0 5px'}}>
      <button style={{background:busy?'#3a5c3a':G,color:busy?'#6aad7a':'#000',border:'none',...serif,fontSize:'1.2rem',letterSpacing:4,padding:'14px 0',borderRadius:6,cursor:busy?'not-allowed':'pointer',fontWeight:700,width:'100%',maxWidth:440,WebkitTapHighlightColor:'transparent'}}
        disabled={busy} onClick={go}>
        {busy?'⏳ Generating...':isForecast?`GET ${DAYS[targetDate.getDay()].toUpperCase()} FORECAST`:'GET REPORT'}
      </button>
      {status&&<div style={{...mono,fontSize:'.67rem',color:busy?OR:GR,marginTop:6,fontWeight:600}}>{status}</div>}
    </div>

    {usedModel&&!busy&&<div style={{...mono,fontSize:'.55rem',color:'#4a6a4a',textAlign:'center',marginTop:3}}>Model: {usedModel}</div>}
    {err&&<div style={{color:'#f87171',background:'#2a0a0a',border:'2px solid #f87171',borderRadius:6,padding:'8px 12px',fontSize:'.82rem',marginTop:7}}>⚠ {err}</div>}

    {/* RESULTS */}
    {report&&(<div>
      <div style={{background:DA,border:`1px solid ${BO}`,borderRadius:6,padding:'8px 12px',marginTop:15,marginBottom:4,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:6}}>
        <span style={{...mono,fontSize:'.62rem',color:G,fontWeight:700}}>📍 {reportCtx.toUpperCase()}</span>
        <div style={{display:'flex',gap:7,alignItems:'center'}}>
          {shareMsg&&<span style={{...mono,fontSize:'.6rem',color:GR}}>{shareMsg}</span>}
          <button onClick={shareReport} style={{background:'transparent',color:GR,border:`1px solid ${BO}`,borderRadius:3,padding:'3px 8px',...mono,fontSize:'.57rem',cursor:'pointer'}}>📤 Share</button>
          <button onClick={savePick} style={{background:'transparent',color:GR,border:`1px solid ${BO}`,borderRadius:3,padding:'3px 8px',...mono,fontSize:'.57rem',cursor:'pointer'}}>⭐ Save Pick</button>
        </div>
      </div>

      <Sec t="Field Intel"/>
      <div style={{background:CA,border:`2px solid ${OR}`,borderLeft:`5px solid ${OR}`,borderRadius:6,padding:12}}>
        <div style={{...serif,fontSize:'.85rem',color:OR,letterSpacing:2,marginBottom:8,textTransform:'uppercase',fontStyle:'italic'}}>📡 {mName} Intelligence — DNR · In-Fisherman · Local Reports</div>
        {(r.intel||[]).map((it,i,a)=>(
          <div key={i} style={{padding:'7px 0',fontSize:'.85rem',lineHeight:1.75,color:W,borderBottom:i<a.length-1?`1px solid ${BO}`:'none',...sans}}>
            {it.finding}<div style={{...mono,fontSize:'.58rem',color:GR,marginTop:3,fontWeight:600}}>📰 {it.source}</div>
          </div>))}
      </div>

      <Sec t="AI Field Assessment"/>
      <div style={{background:CA,border:`2px solid ${G}`,borderLeft:`6px solid ${G}`,padding:'12px 14px',borderRadius:6,fontSize:'.88rem',lineHeight:1.9,color:W,...sans}}>{r.narrative}</div>

      <Sec t="Where to Go"/>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:9}}>
        {(r.waters||[]).map((w,i)=>(
          <div key={i} style={{background:CA,border:w.topPick?`3px solid ${G}`:`2px solid ${BO}`,borderRadius:6,padding:12}}>
            {w.topPick&&<div style={{display:'inline-block',background:G,color:'#000',...mono,fontSize:'.54rem',fontWeight:700,padding:'2px 7px',borderRadius:3,marginBottom:5}}>⭐ TOP PICK</div>}
            <div style={{...serif,fontSize:'.97rem',color:W,marginBottom:3}}>{w.name}</div>
            <div style={{display:'inline-block',...mono,fontSize:'.58rem',background:'#1a3d22',border:`2px solid ${GR}`,color:GR,padding:'2px 7px',borderRadius:4,marginBottom:7,fontWeight:700}}>{w.boat}</div>
            <ul style={{listStyle:'none',marginBottom:7}}>
              {w.species.map((sp,j,a)=>(
                <li key={j} style={{fontSize:'.84rem',color:W,padding:'3px 0',display:'flex',alignItems:'center',gap:5,borderBottom:j<a.length-1?`1px solid ${BO}`:'none'}}>
                  <span style={{width:5,height:5,borderRadius:'50%',background:G,flexShrink:0,display:'inline-block'}}/>{sp}
                </li>))}
            </ul>
            <div style={{fontSize:'.78rem',color:'#b8d4b8',lineHeight:1.65,...sans}}>{w.notes}</div>
          </div>))}
      </div>

      {r.timing?.length>0&&<>
        <Sec t="Best Times"/>
        <div style={{background:CA,border:`2px solid ${BO}`,borderRadius:6,padding:'10px 12px'}}>
          {r.timing.map((t,i,a)=>(
            <div key={i} style={{display:'flex',alignItems:'flex-start',gap:9,padding:'7px 0',fontSize:'.85rem',color:W,lineHeight:1.6,borderBottom:i<a.length-1?`1px solid ${BO}`:'none'}}>
              <span style={{fontSize:'1.1rem',flexShrink:0}}>{t.icon}</span>
              <div><div style={{...mono,fontSize:'.58rem',color:G,letterSpacing:1.5,textTransform:'uppercase',marginBottom:3,fontWeight:600}}>{t.label}</div><span style={{...sans,fontSize:'.85rem'}}>{t.detail}</span></div>
            </div>))}
        </div>
      </>}

      <Sec t="Gear & Rigs"/>
      <div style={{background:CA,border:`2px solid ${BO}`,borderRadius:6,padding:12}}>
        {(r.gear||[]).map((g,i,a)=>(
          <div key={i} style={{padding:'9px 0',borderBottom:i<a.length-1?`1px solid ${BO}`:'none'}}>
            <div style={{...serif,fontSize:'.92rem',color:G,letterSpacing:2,marginBottom:5,textTransform:'uppercase'}}>{g.species}</div>
            <div style={{fontSize:'.86rem',color:W,lineHeight:1.8,...sans}}>{g.recommendation}</div>
          </div>))}
      </div>

      <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:CA,border:`2px solid ${BO}`,borderRadius:6,marginTop:13}}>
        <div style={{...mono,fontSize:'.62rem',color:GR,textTransform:'uppercase',letterSpacing:1.5,whiteSpace:'nowrap',fontWeight:700}}>Bite Confidence</div>
        <div style={{flex:1,height:8,background:DA,borderRadius:4,border:`1px solid ${BO}`,overflow:'hidden'}}>
          <div style={{height:'100%',borderRadius:4,background:conf>=70?GR:OR,width:conf+'%'}}/>
        </div>
        <div style={{...serif,fontSize:'1.2rem',color:W,minWidth:40,textAlign:'right'}}>{conf}%</div>
      </div>

      <div style={{marginTop:9,...mono,fontSize:'.55rem',color:'#4a7a5a',textAlign:'center',lineHeight:1.7}}>
        {anyLive?'Live: Open-Meteo + USGS · ':'Conditions estimated · '}{webStatus.includes('DNR')?'Intel: Michigan DNR + In-Fisherman + MichiganSportsman · ':''}Moon/solunar/sun: local calc St. Joseph MI
      </div>
    </div>)}

    <div style={{marginTop:36,textAlign:'center',...mono,fontSize:'.52rem',color:'#3a6a4a',letterSpacing:1,lineHeight:2}}>
      LIVE: OPEN-METEO + USGS · INTEL: MICHIGAN DNR + IN-FISHERMAN + MICHIGANSPORTSMAN<br/>
      MOON · SOLUNAR · SUN: LOCAL CALC · AI: ANTHROPIC CLAUDE
    </div>
  </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
